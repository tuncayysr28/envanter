<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envanter Sistemi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Poppins:wght@800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Mono', monospace; }
  body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding: 16px; color: #fff; }
  h1 { font-family: 'Poppins', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -2px; }
  .panel { background: #1e293b; border: 2px solid #334155; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
  input, textarea, select { width: 100%; background: #0f172a; border: 2px solid #334155; color: #fff; padding: 8px 10px; font-size: 13px; font-family: 'Space Mono', monospace; }
  input:focus, textarea:focus { outline: 2px solid #4ade80; outline-offset: -2px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn { cursor: pointer; padding: 6px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: #0f172a; color: #94a3b8; border: 2px solid #334155; transition: all 0.15s; font-family: 'Space Mono', monospace; }
  .btn:active { transform: scale(0.97); }
  .btn.active-green { background: #4ade80; color: #0f172a; border-color: #4ade80; }
  .btn.active-blue { background: #60a5fa; color: #0f172a; border-color: #60a5fa; }
  .btn.active-purple { background: #c084fc; color: #0f172a; border-color: #c084fc; }
  .btn.active-orange { background: #fb923c; color: #0f172a; border-color: #fb923c; }
  .btn-add { width: 100%; background: #4ade80; color: #0f172a; font-weight: 700; padding: 12px; font-size: 13px; text-transform: uppercase; border: none; cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 1px; }
  .btn-add:active { background: #22c55e; }
  .summary { background: #0f172a; border: 1px solid #334155; padding: 8px 12px; font-size: 12px; color: #4ade80; font-family: monospace; margin: 4px 0; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 10px; }
  .stat-val { font-weight: 700; font-size: 18px; }
  .btn-excel { width: 100%; background: #0f172a; border: 2px solid #334155; color: #94a3b8; font-weight: 700; padding: 10px; font-size: 11px; text-transform: uppercase; cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 1px; margin-top: 8px; }
  .btn-excel:hover { border-color: #4ade80; color: #4ade80; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #334155; background: #0f172a; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
  tr:nth-child(even) { background: rgba(15,23,42,0.4); }
  .tag-yeni { background: #1e3a5f; color: #93c5fd; padding: 3px 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .tag-kullanilmis { background: #422006; color: #fcd34d; padding: 3px 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .kat-ana { color: #475569; font-size: 10px; }
  .kat-alt { color: #fff; font-weight: 700; font-size: 12px; margin-top: 2px; }
  .barcode-cell { color: #4ade80; font-family: monospace; font-size: 11px; }
  .icon-btn { background: none; border: none; cursor: pointer; color: #475569; padding: 6px; font-size: 14px; }
  .icon-btn:hover { color: #ef4444; }
  .icon-btn.edit:hover { color: #60a5fa; }
  .empty { padding: 60px; text-align: center; color: #334155; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: #1e293b; border: 2px solid #334155; padding: 20px; width: 100%; max-width: 480px; }
  .modal textarea { height: 200px; resize: none; font-size: 11px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .copy-btn { width: 100%; background: #4ade80; color: #0f172a; font-weight: 700; padding: 12px; border: none; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 13px; text-transform: uppercase; margin-top: 10px; }
  .copy-btn.copied { background: #22c55e; }
  .hint { color: #475569; font-size: 11px; text-align: center; margin-top: 8px; }
  .header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .pulse { width: 12px; height: 12px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sub { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 24px; }
  .section-gap { margin-top: 14px; }
  .edit-banner { background: #422006; border: 2px solid #eab308; color: #fde68a; padding: 8px 12px; font-size: 11px; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: none; }
</style>
</head>
<body>

<!-- Excel Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span style="color:#4ade80;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px">📋 Veriyi Kopyala</span>
      <button class="icon-btn" onclick="document.getElementById('modal').classList.remove('open')" style="font-size:18px">✕</button>
    </div>
    <textarea id="csv-area" readonly onclick="this.select()"></textarea>
    <button class="copy-btn" id="copy-btn" onclick="kopyala()">PANOYA KOPYALA</button>
    <p class="hint">Kopyala → Google Sheets veya Excel'e yapıştır</p>
  </div>
</div>

<div style="max-width:1100px;margin:0 auto">
  <div class="header-row">
    <h1>ENVANTER</h1>
    <div class="pulse"></div>
    <span id="sync-durum" style="font-size:11px;color:#64748b;margin-left:8px">⏳ Yükleniyor...</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <p class="sub" style="margin:0">Depo Yönetim Sistemi</p>
    <button class="btn" onclick="verileriYukle()" style="font-size:10px;padding:4px 10px">🔄 Yenile</button>
  </div>

  <!-- FORM -->
  <div class="panel">
    <div class="edit-banner" id="edit-banner">✏️ Düzenleme modu — değiştir ve güncelle</div>

    <div class="section-gap">
      <label>Barcode</label>
      <input type="text" id="barcode" placeholder="Tara veya yapıştır..." onkeydown="if(event.key==='Enter') ekle()" autofocus>
    </div>

    <div class="section-gap">
      <label>Kategori</label>
      <div class="btn-group" id="ana-kat-group"></div>
    </div>

    <div class="section-gap" id="alt-kat-section">
      <label id="alt-kat-label">Model</label>
      <div class="btn-group" id="alt-kat-group"></div>
    </div>

    <div class="section-gap" id="marka-section" style="display:none">
      <label>Marka</label>
      <div class="btn-group" id="marka-group"></div>
    </div>

    <div class="section-gap" id="tip-section" style="display:none">
      <label>Tip</label>
      <div class="btn-group" id="tip-group"></div>
    </div>

    <div class="section-gap" id="coz-section" style="display:none">
      <label>Çözünürlük</label>
      <div class="btn-group" id="coz-group"></div>
    </div>

    <div class="section-gap" id="model-section" style="display:none">
      <label>Model</label>
      <div class="btn-group" id="model-group"></div>
    </div>

    <div class="summary" id="ozet">→</div>

    <div class="section-gap">
      <label>Durum</label>
      <div class="btn-group">
        <button class="btn active-green" id="btn-yeni" onclick="setDurum('Yeni')">Yeni</button>
        <button class="btn" id="btn-kullanilmis" onclick="setDurum('Kullanılmış')">Kullanılmış</button>
      </div>
    </div>

    <div class="section-gap">
      <label>Notlar</label>
      <textarea id="notlar" rows="2" placeholder="İsteğe bağlı..."></textarea>
    </div>

    <div class="section-gap" style="display:flex;gap:8px">
      <button class="btn-add" id="ekle-btn" onclick="ekle()">+ EKLE</button>
      <button class="btn" id="iptal-btn" onclick="iptal()" style="display:none;padding:12px 16px">✕</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="panel">
    <div style="font-family:'Poppins',sans-serif;font-size:16px;font-weight:800;margin-bottom:16px">STATS</div>
    <div class="stat-row"><span style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:2px">Toplam</span><span class="stat-val" style="color:#4ade80" id="stat-toplam">0</span></div>
    <div class="stat-row"><span style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:2px">Yeni</span><span class="stat-val" style="color:#60a5fa" id="stat-yeni">0</span></div>
    <div class="stat-row" style="border:none;margin:0"><span style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:2px">Kullanılmış</span><span class="stat-val" style="color:#fbbf24" id="stat-kul">0</span></div>
    <button class="btn-excel" onclick="indir()">⬇ EXCEL İNDİR</button>
  </div>

  <!-- LİSTE -->
  <div class="panel" style="padding:0;overflow:hidden">
    <div style="padding:16px 20px;border-bottom:2px solid #334155;font-family:'Poppins',sans-serif;font-size:18px;font-weight:800">LİSTE</div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Barcode</th>
            <th>Kategori</th>
            <th>Durum</th>
            <th>Tarih</th>
            <th style="text-align:center">İşlem</th>
          </tr>
        </thead>
        <tbody id="liste"></tbody>
      </table>
      <div class="empty" id="bos-mesaj">Henüz ürün eklenmedi</div>
    </div>
  </div>
</div>

<script>
const KATEGORILER = {
  "Analog Kamera": [],
  "IP Kamera": [],
  "DVR": ["4CH", "8CH", "16CH"],
  "NVR": ["Pro", "Standard", "Lite"],
  "Kart Okuyucu": ["Zksoftware", "Perkotek", "Hikvision"],
  "Ekran": ['24"', '27"', '32"', '42"', '44"', '49"'],
  "Switch": ["4 Port", "8 Port", "16 Port", "24 Port", "48 Port"],
  "Alarm Sistemi": ["Alarm Paneli", "Hareket Sensörü", "Manyetik Kontak", "Siren", "Klavye"],
  "Diğer": ["Adaptör", "Kablo", "Aksesuar", "Diğer"]
};

const KAMERA_KATEGORILER = ["Analog Kamera", "IP Kamera"];
const MARKALAR = ["Hikvision", "Uniview", "Dahua", "Tiandy"];
const TIPLER = ["Dome", "Bullet"];
const COZUNURLUKLER = ["720p", "2MP", "4MP", "8MP"];
const MODEL_GRUPLARI = { "Zksoftware": ["SC 403", "SF300"] };

let urunler = [];
let anaKat = "Analog Kamera";
let altKat = "";
let marka = "";
let tip = "Dome";
let cozunurluk = "2MP";
let model = "";
let durum = "Yeni";
let editId = null;
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHVB_bZXNBo-27HobzgK8i8K7HhHvGpzSWl7uhLY-Glwwf6knQqP8ty8jdjiha-eM7Rg/exec";

// Sheets'ten verileri yükle
async function verileriYukle() {
  try {
    document.getElementById("sync-durum").textContent = "⏳ Yükleniyor...";
    const res = await fetch(SCRIPT_URL + "?action=getir", {redirect: "follow"});
    const data = await res.json();
    urunler = Array.isArray(data) ? data.filter(u => u.id) : [];
    renderListe();
    document.getElementById("sync-durum").textContent = "✅ Senkronize";
  } catch(e) {
    document.getElementById("sync-durum").textContent = "❌ Bağlantı hatası";
    console.error(e);
  }
}

async function kaydet(action, urun) {
  try {
    document.getElementById("sync-durum").textContent = "⏳ Kaydediliyor...";
    const params = new URLSearchParams({action, ...urun});
    await fetch(SCRIPT_URL + "?" + params.toString(), {redirect: "follow"});
    document.getElementById("sync-durum").textContent = "✅ Kaydedildi";
  } catch(e) {
    document.getElementById("sync-durum").textContent = "❌ Kayıt hatası";
    console.error(e);
  }
}

function init() {
  const anaGrp = document.getElementById("ana-kat-group");
  Object.keys(KATEGORILER).forEach(k => {
    const b = document.createElement("button");
    b.className = "btn" + (k === anaKat ? " active-green" : "");
    b.textContent = k;
    b.onclick = () => setAnaKat(k);
    anaGrp.appendChild(b);
  });
  renderAltKat();
  updateOzet();
  verileriYukle();
}

function setAnaKat(k) {
  anaKat = k;
  altKat = KATEGORILER[k][0] || "";
  marka = "";
  tip = "Dome";
  model = "";
  document.querySelectorAll("#ana-kat-group .btn").forEach(b => {
    b.className = "btn" + (b.textContent === k ? " active-green" : "");
  });
  renderAltKat();
  updateOzet();
}

function renderAltKat() {
  const isKamera = KAMERA_KATEGORILER.includes(anaKat);
  
  // Alt kat section
  const altSec = document.getElementById("alt-kat-section");
  const altGrp = document.getElementById("alt-kat-group");
  altGrp.innerHTML = "";

  if (isKamera) {
    altSec.style.display = "none";
  } else {
    altSec.style.display = "block";
    KATEGORILER[anaKat].forEach(a => {
      const b = document.createElement("button");
      b.className = "btn" + (a === altKat ? " active-blue" : "");
      b.textContent = a;
      b.onclick = () => { altKat = a; model = ""; renderAltKat(); updateOzet(); };
      altGrp.appendChild(b);
    });
  }

  // Marka section
  const markaSec = document.getElementById("marka-section");
  const markaGrp = document.getElementById("marka-group");
  markaGrp.innerHTML = "";
  if (isKamera) {
    markaSec.style.display = "block";
    MARKALAR.forEach(m => {
      const b = document.createElement("button");
      b.className = "btn" + (m === marka ? " active-blue" : "");
      b.textContent = m;
      b.onclick = () => { marka = m; renderAltKat(); updateOzet(); };
      markaGrp.appendChild(b);
    });
  } else {
    markaSec.style.display = "none";
  }

  // Tip section
  const tipSec = document.getElementById("tip-section");
  const tipGrp = document.getElementById("tip-group");
  tipGrp.innerHTML = "";
  if (isKamera) {
    tipSec.style.display = "block";
    TIPLER.forEach(t => {
      const b = document.createElement("button");
      b.className = "btn" + (t === tip ? " active-orange" : "");
      b.textContent = t;
      b.onclick = () => { tip = t; renderAltKat(); updateOzet(); };
      tipGrp.appendChild(b);
    });
  } else {
    tipSec.style.display = "none";
  }

  // Çözünürlük
  const cozSec = document.getElementById("coz-section");
  const cozGrp = document.getElementById("coz-group");
  cozGrp.innerHTML = "";
  if (isKamera) {
    cozSec.style.display = "block";
    COZUNURLUKLER.forEach(c => {
      const b = document.createElement("button");
      b.className = "btn" + (c === cozunurluk ? " active-purple" : "");
      b.textContent = c;
      b.onclick = () => { cozunurluk = c; renderAltKat(); updateOzet(); };
      cozGrp.appendChild(b);
    });
  } else {
    cozSec.style.display = "none";
  }

  // Model (Zksoftware vb.)
  const modelSec = document.getElementById("model-section");
  const modelGrp = document.getElementById("model-group");
  modelGrp.innerHTML = "";
  if (!isKamera && MODEL_GRUPLARI[altKat]) {
    modelSec.style.display = "block";
    MODEL_GRUPLARI[altKat].forEach(m => {
      const b = document.createElement("button");
      b.className = "btn" + (m === model ? " active-orange" : "");
      b.textContent = m;
      b.onclick = () => { model = m; renderAltKat(); updateOzet(); };
      modelGrp.appendChild(b);
    });
  } else {
    modelSec.style.display = "none";
  }
}

function updateOzet() {
  document.getElementById("ozet").textContent = "→ " + getTamKat();
}

function getTamKat() {
  const isKamera = KAMERA_KATEGORILER.includes(anaKat);
  if (isKamera) {
    let tam = anaKat;
    if (marka) tam = marka + " " + anaKat;
    tam += " " + tip + " " + cozunurluk;
    return tam;
  }
  let tam = altKat;
  if (MODEL_GRUPLARI[altKat] && model) tam += " " + model;
  return tam;
}

function setDurum(d) {
  durum = d;
  document.getElementById("btn-yeni").className = "btn" + (d === "Yeni" ? " active-green" : "");
  document.getElementById("btn-kullanilmis").className = "btn" + (d === "Kullanılmış" ? " active-green" : "");
}

async function ekle() {
  const barcode = document.getElementById("barcode").value.trim();
  if (!barcode) { alert("Barcode girin!"); return; }
  const notlar = document.getElementById("notlar").value.trim();
  const tarih = new Date().toLocaleDateString("tr-TR");

  if (editId) {
    urunler = urunler.map(u => u.id === editId ? { ...u, barcode, anaKat, kategori: getTamKat(), durum, notlar } : u);
    editId = null;
    document.getElementById("edit-banner").style.display = "none";
    document.getElementById("ekle-btn").textContent = "+ EKLE";
    document.getElementById("iptal-btn").style.display = "none";
  } else {
    urunler.push({ id: Date.now(), barcode, anaKat, kategori: getTamKat(), durum, notlar, tarih });
  }

  document.getElementById("barcode").value = "";
  document.getElementById("notlar").value = "";
  renderListe();
  await kaydet(editId ? "guncelle" : "ekle", urunler[urunler.length - 1]);
  document.getElementById("barcode").focus();
}

function iptal() {
  editId = null;
  document.getElementById("barcode").value = "";
  document.getElementById("notlar").value = "";
  document.getElementById("edit-banner").style.display = "none";
  document.getElementById("ekle-btn").textContent = "+ EKLE";
  document.getElementById("iptal-btn").style.display = "none";
}

async function sil(id) {
  const silinen = urunler.find(u => u.id === id);
  urunler = urunler.filter(u => u.id !== id);
  renderListe();
  if (silinen) await kaydet("sil", silinen);
}

function duzenle(id) {
  const u = urunler.find(u => u.id === id);
  if (!u) return;
  editId = id;
  document.getElementById("barcode").value = u.barcode;
  document.getElementById("notlar").value = u.notlar || "";
  setAnaKat(u.anaKat || "Analog Kamera");
  document.getElementById("edit-banner").style.display = "block";
  document.getElementById("ekle-btn").textContent = "✓ GÜNCELLE";
  document.getElementById("iptal-btn").style.display = "block";
  document.getElementById("barcode").focus();
}

function renderListe() {
  const tbody = document.getElementById("liste");
  const bos = document.getElementById("bos-mesaj");
  document.getElementById("stat-toplam").textContent = urunler.length;
  document.getElementById("stat-yeni").textContent = urunler.filter(u => u.durum === "Yeni").length;
  document.getElementById("stat-kul").textContent = urunler.filter(u => u.durum === "Kullanılmış").length;

  if (urunler.length === 0) { tbody.innerHTML = ""; bos.style.display = "block"; return; }
  bos.style.display = "none";
  tbody.innerHTML = urunler.map(u => `
    <tr>
      <td class="barcode-cell">${u.barcode}</td>
      <td><div class="kat-ana">${u.anaKat}</div><div class="kat-alt">${u.kategori}</div>${u.notlar ? '<div style="color:#475569;font-size:10px;margin-top:2px">📝 ' + u.notlar + '</div>' : ''}</td>
      <td><span class="${u.durum === 'Yeni' ? 'tag-yeni' : 'tag-kullanilmis'}">${u.durum}</span></td>
      <td style="color:#475569;font-size:11px">${u.tarih}</td>
      <td style="text-align:center">
        <button class="icon-btn edit" onclick="duzenle(${u.id})">✏️</button>
        <button class="icon-btn" onclick="sil(${u.id})">🗑️</button>
      </td>
    </tr>
  `).join("");
}

function indir() {
  if (urunler.length === 0) { alert("Liste boş!"); return; }
  const satirlar = [["Barcode", "Ana Kategori", "Kategori", "Durum", "Tarih", "Notlar"]];
  urunler.forEach(u => satirlar.push([u.barcode, u.anaKat || "", u.kategori, u.durum, u.tarih, u.notlar || ""]));
  const csv = "\uFEFF" + satirlar.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(";")).join("\n");

  try {
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "envanter.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    // Fallback: panoya kopyala
    document.getElementById("csv-area").value = csv;
    document.getElementById("modal").classList.add("open");
  }
}

function kopyala() {
  const text = document.getElementById("csv-area").value;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "✓ KOPYALANDI!";
      btn.className = "copy-btn copied";
      setTimeout(() => { btn.textContent = "PANOYA KOPYALA"; btn.className = "copy-btn"; }, 3000);
    });
  } else {
    document.getElementById("csv-area").select();
    document.execCommand("copy");
  }
}

init();
</script>
</body>
</html>
